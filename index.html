<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Dine</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" 
rel="stylesheet">
</head>

<body>

<header>
    <h1>Royal Dine</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#rooms">Rooms</a>
        <a href="#booking">Booking</a>
    </nav>
</header>

<section id="home" class="hero">
    <h2>Welcome to Royal Dine</h2>
    <p>Luxury Dining Experience</p>
    <button class="hero-btn">Order Now</button>
</section>

<section id="menu">
    <h2>Our Special Dishes</h2>
    <div class="menu-container">

        <div class="card">
            <img src="images/pizza.jpg">
            <h3>Pizza</h3>
            <p>₹250</p>
        </div>

        <div class="card">
            <img src="images/burger.jpg">
            <h3>Burger</h3>
            <p>₹150</p>
        </div>

        <div class="card">
            <img src="images/pasta.jpg">
            <h3>Pasta</h3>
            <p>₹200</p>
        </div>

    </div>
</section>
<section id="cart">
    <h2>Your Order 🛒</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button id="orderBtn">Place Order</button>
</section>

<section id="rooms">
    <h2>Luxury Rooms</h2>
    <div class="room-container">

        <div class="card">
            <img src="images/room1.jpg">
            <h3>Deluxe Room</h3>
            <p>₹2000/night</p>
        </div>

        <div class="card">
            <img src="images/room2.jpg">
            <h3>Suite Room</h3>
            <p>₹4000/night</p>
        </div>

    </div>
</section>

<section id="booking">
    <h2>Book Now</h2>
    <form>
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <input type="date" required>
        <select>
            <option>Table</option>
            <option>Room</option>
        </select>
        <button type="submit">Book</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
